name: 🔨 FINAL - Kernel fogos + KSU + SUSFS

on:
  workflow_dispatch:

env:
  DEVICE: fogos
  KERNEL_REPO: https://github.com/Motorola-SM6375-Devs/android_kernel_motorola_sm6375
  KERNEL_BRANCH: sixteen

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            bc bison build-essential flex libssl-dev \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            ccache python3 zip unzip git wget curl patchutils

      - name: Setup Clang
        run: |
          git clone --depth=1 --branch lineage-20.0 \
            https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b \
            $HOME/clang
          echo "$HOME/clang/bin" >> $GITHUB_PATH

      - name: Clone kernel
        run: |
          git clone --depth=1 --branch sixteen \
            https://github.com/Motorola-SM6375-Devs/android_kernel_motorola_sm6375 kernel
          cd kernel && echo "Kernel: $(git rev-parse --short HEAD)"

      # ⭐ FIX #1: sx937x driver error (inject i2c.h)
      - name: Fix sx937x driver
        run: |
          cd kernel
          SAR_FILE="drivers/misc/sx937x/sx937x_sar.c"
          if [ -f "$SAR_FILE" ]; then
            if ! grep -q "^#include <linux/i2c.h>" "$SAR_FILE"; then
              sed -i '1i #include <linux/i2c.h>' "$SAR_FILE"
              echo "✅ sx937x fixed"
            fi
          fi

      # ⭐ FIX #2: Pakai KernelSU ORIGINAL (tiann) - compatible SUSFS
      - name: Integrate KernelSU Original (tiann)
        run: |
          cd kernel
          # Setup.sh otomatis detect kernel 5.4 → pakai non-GKI mode dengan KPROBE
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -
          
          # Verifikasi
          if [ -d "KernelSU" ] || [ -L "drivers/kernelsu" ] || [ -d "drivers/kernelsu" ]; then
            echo "✅ KernelSU integrated"
            ls -la KernelSU 2>/dev/null || true
            ls -la drivers/kernelsu 2>/dev/null || true
          else
            echo "⚠️ Manual integration fallback"
            git clone --depth=1 https://github.com/tiann/KernelSU KernelSU
            ln -sf $(pwd)/KernelSU/kernel drivers/kernelsu
            if ! grep -q "drivers/kernelsu" Makefile; then
              sed -i '/^drivers-$(CONFIG_MODULES)/i drivers-y += drivers/kernelsu/' Makefile
            fi
            if ! grep -q "kernelsu/Kconfig" drivers/Kconfig; then
              sed -i '/^endmenu$/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
            fi
          fi

      # ⭐ FIX #3: Apply SUSFS patches (compatible dengan KSU original)
      - name: Apply SUSFS patches
        run: |
          cd kernel
          git clone --depth=1 --branch kernel-5.4 \
            https://gitlab.com/simonpunk/susfs4ksu.git susfs_temp

          # Apply KSU patch ke KernelSU original (di folder KernelSU/)
          if [ -d "KernelSU" ]; then
            cd KernelSU
            patch -p1 < ../susfs_temp/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch 2>&1 || echo "⚠️ KSU patch partial"
            cd ..
          fi

          # Apply kernel patch (dengan toleransi error)
          patch -p1 --no-backup-if-mismatch < susfs_temp/kernel_patches/50_add_susfs_in_kernel-5.4.patch 2>&1 || echo "⚠️ Kernel patch partial"

          # ⭐ FIX #4: Manual define INODE_STATE_SUS_KSTAT
          if ! grep -rq "INODE_STATE_SUS_KSTAT" include/linux/; then
            cat >> include/linux/fs.h << 'EOF'

          /* SUSFS manual fix */
          #ifndef INODE_STATE_SUS_KSTAT
          #define INODE_STATE_SUS_KSTAT (1 << 15)
          #endif
          EOF
            echo "✅ INODE_STATE_SUS_KSTAT defined"
          fi

          # Manual define MNT_SUSFS
          if ! grep -q "MNT_SUSFS" include/linux/mount.h; then
            cat >> include/linux/mount.h << 'EOF'

          #ifndef MNT_SUSFS
          #define MNT_SUSFS 0x10000000
          #endif
          EOF
            echo "✅ MNT_SUSFS defined"
          fi

          # Copy susfs.h jika ada
          if [ -f "susfs_temp/kernel_patches/include/linux/susfs.h" ]; then
            cp susfs_temp/kernel_patches/include/linux/susfs.h include/linux/ 2>/dev/null || true
          fi

          rm -rf susfs_temp

      # ⭐ FIX #5: Urutan BENAR - Load defconfig DULU, baru set KSU configs
      - name: Configure kernel (URUTAN BENAR)
        run: |
          cd kernel
          export ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1
          export CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          mkdir -p out

          # Step 1: Load defconfig
          make O=out ARCH=arm64 vendor/holi-qgki_defconfig
          scripts/kconfig/merge_config.sh -O out arch/arm64/configs/vendor/ext_config/moto-holi-fogos.config

          # Step 2: Set SEMUA configs (KSU + SUSFS + fix prompts)
          cat >> out/.config << 'EOF'
          CONFIG_KSU=y
          CONFIG_KSU_KPROBE_HOOKS=y
          CONFIG_KSU_MANUAL_HOOK=n
          CONFIG_KPROBES=y
          CONFIG_KPROBE_EVENTS=y
          CONFIG_HAVE_KPROBES=y
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=n
          CONFIG_OVERLAY_FS=y
          CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
          CONFIG_SHADOW_CALL_STACK=n
          CONFIG_LTO_NONE=y
          CONFIG_INIT_STACK_NONE=y
          CONFIG_INIT_ON_ALLOC_DEFAULT_ON=n
          CONFIG_INIT_ON_FREE_DEFAULT_ON=n
          CONFIG_RELR=y
          CONFIG_KSU_DEBUG=n
          CONFIG_KSU_DISABLE_MANAGER=n
          CONFIG_KSU_DISABLE_POLICY=n
          CONFIG_KSU_ALLOWLIST_WORKAROUND=n
          EOF

          # Step 3: Finalize (2x untuk pastikan)
          make O=out ARCH=arm64 olddefconfig
          make O=out ARCH=arm64 olddefconfig
          echo "✅ Config finalized"

      - name: Build kernel
        run: |
          cd kernel
          export ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1
          export CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          export USE_CCACHE=1 CCACHE_DIR=$HOME/.ccache

          make -j$(nproc) O=out Image dtbs 2>&1 | tee build.log

          ls -la out/arch/arm64/boot/ || true
          test -f out/arch/arm64/boot/Image || { echo "❌ Build failed"; tail -150 build.log; exit 1; }
          echo "✅ Build SUCCESS!"

      - name: Package AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3
          cd AnyKernel3
          cp ../kernel/out/arch/arm64/boot/Image .
          mkdir -p dtb
          find ../kernel/out/arch/arm64/boot/dts/ -name "*.dtb" -exec cp {} dtb/ \; 2>/dev/null || true
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/DEVICE_NAME=.*/DEVICE_NAME="fogos"/' anykernel.sh
          ZIP="fogos-KSU-SUSFS-$(date +%Y%m%d-%H%M).zip"
          zip -r9 "../$ZIP" * -x .git README.md .gitignore
          cd ..
          echo "ZIP_NAME=$ZIP" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fogos-kernel-ksu-susfs
          path: |
            ${{ env.ZIP_NAME }}
            kernel/out/arch/arm64/boot/Image
          retention-days: 30
