name: Build fogos RKSU+SUSFS

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  DEVICE: fogos
  KERNEL_REPO: https://github.com/Motorola-SM6375-Devs/android_kernel_motorola_sm6375
  KERNEL_BRANCH: sixteen

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends bc bison build-essential flex libssl-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi ccache python3 zip unzip git wget curl patchutils

      - name: Setup Clang
        run: |
          git clone --depth=1 -b lineage-20.0 https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b $HOME/clang
          echo "$HOME/clang/bin" >> $GITHUB_PATH

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 -b ${{ env.KERNEL_BRANCH }} ${{ env.KERNEL_REPO }} kernel
          cd kernel && echo "Kernel: $(git rev-parse --short HEAD)"

      - name: Fix Motorola sx937x Bug & Integrate RKSU
        run: |
          cd kernel
          # FIX 1: Bug i2c Motorola
          sed -i '1i #include <linux/i2c.h>' drivers/misc/sx937x/sx937x_sar.c
          
          # Integrate RKSU (rsuntk)
          git clone --depth=1 -b main https://github.com/rsuntk/KernelSU.git KernelSU
          ln -sf $(pwd)/KernelSU/kernel drivers/kernelsu
          sed -i '/^drivers-$(CONFIG_MODULES)/i drivers-y += drivers/kernelsu/' Makefile
          sed -i '/^endmenu$/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig

      - name: Apply SUSFS & Force Fix Headers
        run: |
          cd kernel
          git clone --depth=1 -b kernel-5.4 https://gitlab.com/simonpunk/susfs4ksu.git susfs_temp
          
          # Apply patch (ignore failures on Motorola modified files)
          patch -p1 < susfs_temp/kernel_patches/50_add_susfs_in_kernel-5.4.patch || true
          
          # FIX 2: Force inject missing SUSFS definitions that failed to patch
          echo "#define INODE_STATE_SUS_KSTAT 0x00008000" >> include/linux/fs.h
          echo "#define MNT_SUSFS 0x10000000" >> include/linux/mount.h
          
          rm -rf susfs_temp

      - name: Configure Kernel (Non-Interactive)
        run: |
          cd kernel
          export ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1
          export CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          mkdir -p out
          
          make O=out ARCH=arm64 vendor/holi-qgki_defconfig
          scripts/kconfig/merge_config.sh -O out arch/arm64/configs/vendor/ext_config/moto-holi-fogos.config
          
          # FIX 3: Use scripts/config to prevent interactive prompts crash
          scripts/config --file out/.config --enable KSU
          scripts/config --file out/.config --disable KSU_MANUAL_HOOK
          scripts/config --file out/.config --enable KPROBES
          scripts/config --file out/.config --enable HAVE_KPROBES
          scripts/config --file out/.config --enable KPROBE_EVENTS
          scripts/config --file out/.config --enable KSU_SUSFS
          scripts/config --file out/.config --enable KSU_SUSFS_SUS_PATH
          scripts/config --file out/.config --enable KSU_SUSFS_SUS_MOUNT
          scripts/config --file out/.config --enable KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT
          scripts/config --file out/.config --enable KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT
          scripts/config --file out/.config --enable KSU_SUSFS_SPOOF_UNAME
          scripts/config --file out/.config --enable KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS
          scripts/config --file out/.config --disable KSU_SUSFS_ENABLE_LOG
          scripts/config --file out/.config --enable OVERLAY_FS
          
          # Force accept all defaults without prompting
          yes "" | make O=out ARCH=arm64 olddefconfig

      - name: Build Kernel
        run: |
          cd kernel
          export ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1
          export CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          export USE_CCACHE=1 CCACHE_DIR=$HOME/.ccache
          
          make -j$(nproc) O=out ARCH=arm64 Image.gz dtbs 2>&1 | tee build.log
          test -f out/arch/arm64/boot/Image.gz || { tail -100 build.log; exit 1; }

      - name: Package AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3
          cd AnyKernel3
          cp ../kernel/out/arch/arm64/boot/Image.gz .
          mkdir -p dtb && find ../kernel/out/arch/arm64/boot/dts/ -name "*.dtb" -exec cp {} dtb/ \; 2>/dev/null || true
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/DEVICE_NAME=.*/DEVICE_NAME="fogos"/' anykernel.sh
          sed -i 's/KERNEL_NAME=.*/KERNEL_NAME="AyakaUI-RKSU-SUSFS"/' anykernel.sh
          zip -r9 "../fogos-RKSU-SUSFS-$(date +%Y%m%d).zip" * -x .git README.md .gitignore
          cd ..
          echo "ZIP_NAME=fogos-RKSU-SUSFS-$(date +%Y%m%d).zip" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fogos-kernel-rksu-susfs
          path: ${{ env.ZIP_NAME }}
          retention-days: 30
