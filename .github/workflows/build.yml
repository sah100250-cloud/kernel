name: Test Build Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    
    steps:
      - name: Checkout workspace
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential flex \
            libssl-dev gcc-aarch64-linux-gnu ccache \
            python3 python3-pip zip unzip git wget curl

      - name: Download LineageOS Clang (FAST)
        run: |
          cd /tmp
          # Use LineageOS pinned clang (known to work) [[11]]
          git clone --depth=1 --branch lineage-20.0 \
            https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b \
            $HOME/clang
          echo "$HOME/clang/bin" >> $GITHUB_PATH
          clang --version

      - name: Clone kernel source
        run: |
          git clone --depth=1 --branch sixteen \
            https://github.com/Motorola-SM6375-Devs/android_kernel_motorola_sm6375.git \
            kernel

      - name: Check defconfig
        run: |
          echo "Available defconfigs:"
          ls kernel/arch/arm64/configs/ | grep -i "fogos\|lineage"
          echo "---"
          cat kernel/arch/arm64/configs/*fogos* 2>/dev/null | head -5 || echo "No fogos defconfig found"

      - name: Configure kernel
        run: |
          cd kernel
          export ARCH=arm64
          export CC=clang
          export LLVM=1
          export LLVM_IAS=1
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-gnu-
          export KBUILD_BUILD_USER=github
          export KBUILD_BUILD_HOST=actions
          mkdir -p out
          
          # Try different defconfig names
          if [ -f "arch/arm64/configs/lineage_fogos_defconfig" ]; then
            echo "Using lineage_fogos_defconfig"
            make O=out ARCH=arm64 lineage_fogos_defconfig
          elif [ -f "arch/arm64/configs/fogos_defconfig" ]; then
            echo "Using fogos_defconfig"
            make O=out ARCH=arm64 fogos_defconfig
          else
            echo "Using vendor config"
            make O=out ARCH=arm64 vendor/sm6375-fogos-perf_defconfig || \
            make O=out ARCH=arm64 vendor/fogos_defconfig || \
            make O=out ARCH=arm64 gki_defconfig
          fi
          
          make O=out ARCH=arm64 olddefconfig
          echo "Config done"

      - name: Build kernel
        run: |
          cd kernel
          export ARCH=arm64
          export CC=clang
          export LLVM=1
          export LLVM_IAS=1
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          # Build only Image (simplest target)
          make -j$(nproc) O=out ARCH=arm64 Image 2>&1 | tail -50

      - name: Check output
        run: |
          ls -lh kernel/out/arch/arm64/boot/ 2>/dev/null || echo "No boot directory"
          test -f kernel/out/arch/arm64/boot/Image && echo "✅ Image exists" || echo "❌ No Image"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-test
          path: kernel/out/arch/arm64/boot/Image*
