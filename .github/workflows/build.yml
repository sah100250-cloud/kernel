name: Build Kernel fogos + RKSU + SUSFS

on:
  workflow_dispatch:

env:
  DEVICE: fogos
  KERNEL_REPO: https://github.com/Motorola-SM6375-Devs/android_kernel_motorola_sm6375
  KERNEL_BRANCH: sixteen
  RKSU_REPO: https://github.com/rsuntk/KernelSU
  RKSU_BRANCH: main
  SUSFS_REPO: https://gitlab.com/simonpunk/susfs4ksu.git
  SUSFS_BRANCH: kernel-5.4

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            bc bison build-essential flex libssl-dev \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            ccache python3 zip unzip git wget curl patchutils

      - name: Setup Clang
        run: |
          git clone --depth=1 --branch lineage-20.0 \
            https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b \
            $HOME/clang
          echo "$HOME/clang/bin" >> $GITHUB_PATH

      - name: Clone kernel source
        run: |
          git clone --depth=1 --branch ${{ env.KERNEL_BRANCH }} \
            ${{ env.KERNEL_REPO }} kernel
          cd kernel
          echo "Kernel: $(git rev-parse --short HEAD)"

      - name: Fix sx937x driver (missing i2c.h)
        run: |
          cd kernel
          SAR_FILE="drivers/misc/sx937x/sx937x_sar.c"
          if [ -f "$SAR_FILE" ]; then
            if ! grep -q "^#include <linux/i2c.h>" "$SAR_FILE"; then
              sed -i '1i #include <linux/i2c.h>' "$SAR_FILE"
              echo "✅ Fixed sx937x i2c.h include"
            fi
          fi

      - name: Integrate RKSU (rsuntk/KernelSU)
        run: |
          cd kernel
          
          # Clone RKSU dengan branch main (support non-GKI)
          git clone --depth=1 --branch ${{ env.RKSU_BRANCH }} \
            ${{ env.RKSU_REPO }} KernelSU
          
          # Setup symlink
          ln -sf $(pwd)/KernelSU/kernel drivers/kernelsu
          
          # Inject ke Makefile
          if ! grep -q "drivers/kernelsu" Makefile; then
            sed -i '/^drivers-$(CONFIG_MODULES)/i drivers-y += drivers/kernelsu/' Makefile
          fi
          
          # Inject ke Kconfig
          if ! grep -q "kernelsu/Kconfig" drivers/Kconfig; then
            sed -i '/^endmenu$/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
          fi
          
          echo "✅ RKSU integrated"

      - name: Apply SUSFS patches
        run: |
          cd kernel
          
          # Clone SUSFS
          git clone --depth=1 --branch ${{ env.SUSFS_BRANCH }} \
            ${{ env.SUSFS_REPO }} susfs_temp
          
          # Apply kernel patches (skip KSU patches karena RKSU sudah include)
          patch -p1 --no-backup-if-mismatch < susfs_temp/kernel_patches/50_add_susfs_in_kernel-5.4.patch 2>&1 || true
          
          # Manual fix untuk INODE_STATE_SUS_KSTAT
          if ! grep -rq "INODE_STATE_SUS_KSTAT" include/linux/; then
            cat >> include/linux/fs.h << 'EOF'
          
          /* SUSFS manual fix */
          #ifndef INODE_STATE_SUS_KSTAT
          #define INODE_STATE_SUS_KSTAT (1 << 15)
          #endif
          EOF
            echo "✅ Added INODE_STATE_SUS_KSTAT"
          fi
          
          # Manual fix untuk MNT_SUSFS
          if ! grep -q "MNT_SUSFS" include/linux/mount.h; then
            cat >> include/linux/mount.h << 'EOF'
          
          #ifndef MNT_SUSFS
          #define MNT_SUSFS 0x10000000
          #endif
          EOF
            echo "✅ Added MNT_SUSFS"
          fi
          
          rm -rf susfs_temp
          echo "✅ SUSFS patches applied"

      - name: Configure kernel
        run: |
          cd kernel
          export ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1
          export CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          mkdir -p out
          
          # Load defconfig
          make O=out ARCH=arm64 vendor/holi-qgki_defconfig
          scripts/kconfig/merge_config.sh -O out arch/arm64/configs/vendor/ext_config/moto-holi-fogos.config
          
          # Tambahkan config RKSU + SUSFS (Manual Hook mode untuk non-GKI)
          cat >> out/.config << 'EOF'
          CONFIG_KSU=y
          CONFIG_KSU_MANUAL_HOOK=y
          CONFIG_KSU_KPROBE_HOOKS=n
          CONFIG_KPROBES=y
          CONFIG_KPROBE_EVENTS=y
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=n
          CONFIG_OVERLAY_FS=y
          CONFIG_SHADOW_CALL_STACK=n
          CONFIG_LTO_NONE=y
          CONFIG_INIT_STACK_NONE=y
          CONFIG_INIT_ON_ALLOC_DEFAULT_ON=n
          CONFIG_INIT_ON_FREE_DEFAULT_ON=n
          EOF
          
          # Finalize config (non-interactive)
          make O=out ARCH=arm64 olddefconfig
          make O=out ARCH=arm64 olddefconfig
          
          echo "✅ Kernel configured"

      - name: Build kernel
        run: |
          cd kernel
          export ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1
          export CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          export USE_CCACHE=1 CCACHE_DIR=$HOME/.ccache
          
          make -j$(nproc) O=out ARCH=arm64 Image dtbs 2>&1 | tee build.log
          
          if [ ! -f "out/arch/arm64/boot/Image" ]; then
            echo "❌ Build failed! Last 100 lines:"
            tail -100 build.log
            exit 1
          fi
          
          echo "✅ Build SUCCESS!"

      - name: Package AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3
          cd AnyKernel3
          
          cp ../kernel/out/arch/arm64/boot/Image .
          mkdir -p dtb
          find ../kernel/out/arch/arm64/boot/dts/ -name "*.dtb" -exec cp {} dtb/ \; 2>/dev/null || true
          
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/DEVICE_NAME=.*/DEVICE_NAME="fogos"/' anykernel.sh
          sed -i 's/KERNEL_NAME=.*/KERNEL_NAME="AyakaUI-fogos-RKSU-SUSFS"/' anykernel.sh
          
          ZIP_NAME="${{ env.DEVICE }}-RKSU-SUSFS-$(date +%Y%m%d-%H%M).zip"
          zip -r9 "../$ZIP_NAME" * -x .git README.md .gitignore
          
          cd ..
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DEVICE }}-kernel-rksu-susfs
          path: |
            ${{ env.ZIP_NAME }}
            kernel/out/arch/arm64/boot/Image
          retention-days: 30
