name: Kernel fogos | RKSU + SUSFS

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git curl wget python3 bc bison \
            build-essential ccache flex \
            libssl-dev libncurses5-dev libelf-dev \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            zip unzip cpio kmod pahole

      - name: Clone kernel source
        run: |
          git clone --depth=1 \
            https://github.com/${{ github.repository }}.git \
            -b sixteen kernel_src
          echo "=== Configs available ==="
          ls kernel_src/arch/arm64/configs/vendor/
          echo "=== Ext configs ==="
          ls kernel_src/arch/arm64/configs/vendor/ext_config/ 2>/dev/null || echo "no ext_config"

      - name: Download Clang toolchain
        run: |
          mkdir clang
          wget -q \
            https://github.com/ZyCromerZ/Clang/releases/download/20.0.0git-20250101-release/Clang-20.0.0git-20250101.tar.gz \
            -O clang.tar.gz
          tar -xf clang.tar.gz -C clang
          echo "Clang: $(clang/bin/clang --version | head -1)"

      - name: Setup RKSU (rsuntk/KernelSU)
        run: |
          cd kernel_src
          echo ">>> Integrating RKSU..."
          curl -LSs \
            https://raw.githubusercontent.com/rsuntk/KernelSU/main/kernel/setup.sh \
            | bash -s main
          echo "RKSU version: $(cat KernelSU/kernel/Makefile | grep '^VERSION' | head -1)"

      - name: Apply SUSFS patch for kernel 5.4
        run: |
          echo ">>> Downloading SUSFS patch for 5.4 (NonGKI)..."
          wget -q \
            https://raw.githubusercontent.com/JackA1ltman/NonGKI_Kernel_Build_2nd/mainline/Patches/Patch/susfs_patch_to_5.4.patch \
            -O susfs_5.4.patch

          echo ">>> Cloning SUSFS source files..."
          git clone --depth=1 \
            https://gitlab.com/simonpunk/susfs4ksu.git \
            -b kernel-5.4 susfs_src

          cd kernel_src

          echo ">>> Copying SUSFS source files..."
          cp -v ../susfs_src/kernel_patches/fs/susfs.c fs/ 2>/dev/null || true
          cp -v ../susfs_src/kernel_patches/include/linux/susfs.h include/linux/ 2>/dev/null || true
          cp -v ../susfs_src/kernel_patches/include/linux/susfs_def.h include/linux/ 2>/dev/null || true
          cp -v ../susfs_src/kernel_patches/include/linux/sus_su.h include/linux/ 2>/dev/null || true

          echo ">>> Applying SUSFS patch..."
          patch -p1 --fuzz=3 < ../susfs_5.4.patch \
            && echo "SUSFS patch: OK" \
            || echo "SUSFS patch: applied with warnings"

          find . -name "*.orig" -delete 2>/dev/null || true
          find . -name "*.rej" -delete 2>/dev/null || true

      - name: Generate defconfig for fogos
        run: |
          cd kernel_src
          export PATH="${{ github.workspace }}/clang/bin:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64

          MAKE_ARGS="O=../out ARCH=arm64 CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi-"

          echo ">>> Step 1: Apply base holi-qgki defconfig"
          make $MAKE_ARGS vendor/holi-qgki_defconfig

          echo ">>> Step 2: Merge fogos-specific configs"
          for cfg in \
            arch/arm64/configs/vendor/ext_config/moto-holi.config \
            arch/arm64/configs/vendor/ext_config/moto-holi-fogos.config; do
            if [ -f "$cfg" ]; then
              echo "Merging: $cfg"
              ./scripts/kconfig/merge_config.sh -m -O ../out ../out/.config "$cfg"
            else
              echo "Warning: $cfg not found, skipping"
            fi
          done

          echo ">>> Step 3: Enable RKSU + SUSFS configs"
          scripts/config --file ../out/.config \
            -e KSU \
            -d KSU_WITH_KPROBES \
            -e KSU_MANUAL_HOOK \
            -e KSU_SUSFS \
            -e KSU_SUSFS_SUS_PATH \
            -e KSU_SUSFS_SUS_MOUNT \
            -e KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT \
            -e KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT \
            -e KSU_SUSFS_SUS_KSTAT \
            -d KSU_SUSFS_SUS_OVERLAYFS \
            -e KSU_SUSFS_TRY_UMOUNT \
            -e KSU_SUSFS_SPOOF_UNAME \
            -e KSU_SUSFS_ENABLE_LOG \
            -e KSU_SUSFS_OPEN_REDIRECT \
            -d KSU_SUSFS_SUS_SU

          echo ">>> Step 4: Finalize with olddefconfig"
          make $MAKE_ARGS olddefconfig

          echo "=== KSU + SUSFS config result ==="
          grep -E "CONFIG_KSU|CONFIG_KSU_SUSFS" ../out/.config || echo "ERROR: KSU/SUSFS not found in config!"

      - name: Build kernel
        run: |
          cd kernel_src
          export PATH="${{ github.workspace }}/clang/bin:$PATH"

          echo ">>> Building with $(nproc) threads..."
          make -j$(nproc) \
            O=../out \
            ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            LLVM=1 \
            LLVM_IAS=1 \
            Image.gz dtbo.img 2>&1 | tee ../build.log

          echo "=== Build result ==="
          if [ -f ../out/arch/arm64/boot/Image.gz ]; then
            echo "SUCCESS: Image.gz built"
            ls -lh ../out/arch/arm64/boot/
          else
            echo "FAILED: Image.gz not found"
            echo "Last 50 lines of build log:"
            tail -50 ../build.log
            exit 1
          fi

      - name: Package AnyKernel3
        run: |
          git clone --depth=1 \
            https://github.com/osm0sis/AnyKernel3.git ak3

          cp out/arch/arm64/boot/Image.gz ak3/
          [ -f out/arch/arm64/boot/dtbo.img ] && \
            cp out/arch/arm64/boot/dtbo.img ak3/ || true

          cat > ak3/anykernel.sh << 'EOF'
          # AnyKernel3 for fogos (Moto G34/G45 5G) - RKSU + SUSFS
          properties() { '
          kernel.string=RKSU + SUSFS | fogos | AyakaUI
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=fogos
          device.name2=XT2363-2
          device.name3=XT2363-3
          device.name4=XT2349-1
          device.name5=moto g45 5G
          device.name6=moto g34 5G
          '; }
          block=/dev/block/bootdevice/by-name/boot
          is_slot_device=1
          ramdisk_compression=auto
          patch_vbmeta_flag=auto
          . tools/ak3-core.sh
          . tools/repacktools.sh
          . tools/repack.sh
          EOF

          DATE=$(date +%Y%m%d-%H%M)
          ZIP="kernel-fogos-rksu-susfs-${DATE}.zip"
          cd ak3
          zip -r9 "../${ZIP}" . -x ".git/*" "README.md"
          cd ..
          echo "ZIP_NAME=${ZIP}" >> $GITHUB_ENV
          ls -lh "${ZIP}"

      - name: Upload kernel zip
        uses: actions/upload-artifact@v4
        with:
          name: kernel-fogos-rksu-susfs-${{ github.run_number }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          retention-days: 7
