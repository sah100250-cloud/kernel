name: Build Kernel fogos + KSU-Next + SUSFS

on:
  workflow_dispatch:

env:
  DEVICE: fogos
  KERNEL_REPO: https://github.com/Motorola-SM6375-Devs/android_kernel_motorola_sm6375
  KERNEL_BRANCH: sixteen
  # FIX: Hapus https://github.com/ agar URL raw tidak double
  KSU_REPO: KernelSU-Next/KernelSU-Next
  KSU_BRANCH: next
  SUSFS_REPO: https://gitlab.com/simonpunk/susfs4ksu.git
  SUSFS_BRANCH: kernel-5.4

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    
    steps:
      - name: Checkout workspace
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            bc bison build-essential flex libssl-dev \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            ccache python3 zip unzip git wget curl

      - name: Setup Clang toolchain
        run: |
          cd /tmp
          git clone --depth=1 --branch lineage-20.0 \
            https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b \
            $HOME/clang
          echo "$HOME/clang/bin" >> $GITHUB_PATH
          clang --version

      - name: Clone kernel source
        run: |
          git clone --depth=1 --branch ${{ env.KERNEL_BRANCH }} \
            ${{ env.KERNEL_REPO }} kernel
          cd kernel
          echo "Kernel commit: $(git rev-parse --short HEAD)"

      - name: Find and configure defconfig (GKI FIX)
        id: find_defconfig
        run: |
          cd kernel
          echo "=== Checking vendor configs (CRITICAL FOR SM6375) ==="
          ls arch/arm64/configs/vendor/ || true
          ls arch/arm64/configs/vendor/ext_config/ || true
          
          export ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1
          export CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          mkdir -p out
          
          # SM6375 uses vendor/holi-qgki_defconfig or similar
          DEFCONFIG=""
          if [ -f "arch/arm64/configs/vendor/holi-qgki_defconfig" ]; then
            DEFCONFIG="vendor/holi-qgki_defconfig"
          elif [ -f "arch/arm64/configs/vendor/sm6375-gki_defconfig" ]; then
            DEFCONFIG="vendor/sm6375-gki_defconfig"
          elif [ -f "arch/arm64/configs/vendor/blair-qgki_defconfig" ]; then
            DEFCONFIG="vendor/blair-qgki_defconfig"
          elif [ -f "arch/arm64/configs/vendor/fogos_defconfig" ]; then
            DEFCONFIG="vendor/fogos_defconfig"
          else
            DEFCONFIG=$(ls arch/arm64/configs/vendor/*_defconfig 2>/dev/null | head -1 | sed 's|arch/arm64/configs/||')
            if [ -z "$DEFCONFIG" ]; then
              echo "ERROR: No vendor defconfig found!"
              exit 1
            fi
          fi
          
          echo "Selected base defconfig: $DEFCONFIG"
          make O=out ARCH=arm64 $DEFCONFIG
          
          # Merge fogos specific fragment (LineageOS method)
          if [ -f "arch/arm64/configs/vendor/ext_config/moto-holi-fogos.config" ]; then
            echo "Merging moto-holi-fogos.config fragment..."
            scripts/kconfig/merge_config.sh -O out arch/arm64/configs/vendor/ext_config/moto-holi-fogos.config
          elif [ -f "arch/arm64/configs/vendor/ext_config/fogos.config" ]; then
            echo "Merging fogos.config fragment..."
            scripts/kconfig/merge_config.sh -O out arch/arm64/configs/vendor/ext_config/fogos.config
          fi

      - name: Integrate KernelSU-Next
        run: |
          cd kernel
          # FIX: URL sekarang benar (tidak double https)
          curl -LSs "https://raw.githubusercontent.com/${{ env.KSU_REPO }}/${{ env.KSU_BRANCH }}/kernel/setup.sh" | bash -s legacy
          if [ -d "KernelSU-Next" ]; then
            echo "✅ KernelSU-Next integrated"
          else
            echo "❌ KernelSU-Next integration failed"
            exit 1
          fi

      - name: Apply SUSFS patch
        run: |
          cd kernel
          git clone --depth=1 --branch ${{ env.SUSFS_BRANCH }} \
            ${{ env.SUSFS_REPO }} susfs_temp
          
          if [ -f "susfs_temp/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch" ]; then
            cd KernelSU-Next
            patch -p1 < ../susfs_temp/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch 2>&1 || echo "⚠️ KSU patch may already be applied"
            cd ..
          fi
          
          if [ -f "susfs_temp/kernel_patches/50_add_susfs_in_kernel-5.4.patch" ]; then
            patch -p1 < susfs_temp/kernel_patches/50_add_susfs_in_kernel-5.4.patch 2>&1 || {
              echo "⚠️ Auto-patch failed, trying manual copy..."
              cp -f susfs_temp/kernel_patches/fs/*.c fs/ 2>/dev/null || true
              cp -f susfs_temp/kernel_patches/include/linux/*.h include/linux/ 2>/dev/null || true
            }
          fi
          rm -rf susfs_temp

      - name: Add KSU + SUSFS configs
        run: |
          cd kernel
          echo "CONFIG_KSU=y" >> out/.config
          echo "CONFIG_KSU_KPROBE_HOOKS=y" >> out/.config
          echo "CONFIG_KPROBES=y" >> out/.config
          echo "CONFIG_KSU_SUSFS=y" >> out/.config
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> out/.config
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> out/.config
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> out/.config
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> out/.config
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> out/.config
          echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> out/.config
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=n" >> out/.config
          echo "CONFIG_OVERLAY_FS=y" >> out/.config
          
          make O=out ARCH=arm64 olddefconfig

      - name: Build kernel
        run: |
          cd kernel
          export ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1
          export CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          export USE_CCACHE=1 CCACHE_DIR=$HOME/.ccache
          
          make -j$(nproc) O=out ARCH=arm64 Image dtbs 2>&1 | tee build.log
          
          if [ ! -f "out/arch/arm64/boot/Image" ]; then
            echo "❌ Build failed! Last 100 lines:"
            tail -100 build.log
            exit 1
          fi

      - name: Package AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3
          cd AnyKernel3
          cp ../kernel/out/arch/arm64/boot/Image .
          mkdir -p dtb && find ../kernel/out/arch/arm64/boot/dts/ -name "*.dtb" -exec cp {} dtb/ \; 2>/dev/null || true
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/DEVICE_NAME=.*/DEVICE_NAME="fogos"/' anykernel.sh
          TIMESTAMP=$(date +%Y%m%d-%H%M)
          ZIP_NAME="fogos-KSUNext-SUSFS-${TIMESTAMP}.zip"
          zip -r9 "../${ZIP_NAME}" * -x .git README.md .gitignore
          cd ..
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fogos-kernel-ksunext-susfs
          path: |
            ${{ env.ZIP_NAME }}
            kernel/out/arch/arm64/boot/Image
          retention-days: 30
