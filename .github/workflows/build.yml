name: Build Kernel fogos RKSU+SUSFS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            bc bison build-essential flex libssl-dev \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            ccache python3 zip unzip git wget curl

      - name: Setup Clang
        run: |
          git clone --depth=1 --branch lineage-20.0 \
            https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b \
            $HOME/clang
          echo "$HOME/clang/bin" >> $GITHUB_PATH

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 --branch sixteen \
            https://github.com/Motorola-SM6375-Devs/android_kernel_motorola_sm6375 kernel
          cd kernel
          echo "Kernel commit: $(git rev-parse --short HEAD)"

      - name: Fix Motorola sx937x Bug
        run: |
          cd kernel
          if [ -f "drivers/misc/sx937x/sx937x_sar.c" ]; then
            sed -i '1i #include <linux/i2c.h>' drivers/misc/sx937x/sx937x_sar.c
          fi

      - name: Integrate RKSU + SUSFS (susfs-main)
        run: |
          cd kernel
          # Gunakan setup.sh resmi dari rsuntk/KernelSU branch susfs-main
          curl -LSs "https://raw.githubusercontent.com/rsuntk/KernelSU/susfs-main/kernel/setup.sh" | bash -s susfs-main || {
            echo "setup.sh failed, falling back to manual integration"
            git clone --depth=1 --branch susfs-main https://github.com/rsuntk/KernelSU.git KernelSU
            ln -sf $(pwd)/KernelSU/kernel drivers/kernelsu
            if ! grep -q "drivers/kernelsu" Makefile; then
              sed -i '/^drivers-$(CONFIG_MODULES)/i drivers-y += drivers/kernelsu/' Makefile
            fi
            if ! grep -q "kernelsu/Kconfig" drivers/Kconfig; then
              sed -i '/^endmenu$/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
            fi
          }

      - name: Configure Kernel (Force Kprobes)
        run: |
          cd kernel
          export ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1
          export CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          mkdir -p out
          
          make O=out ARCH=arm64 vendor/holi-qgki_defconfig
          scripts/kconfig/merge_config.sh -O out arch/arm64/configs/vendor/ext_config/moto-holi-fogos.config
          
          # PENTING: Paksa KPROBES dan MATIKAN MANUAL_HOOK agar tidak kena error Kbuild:142
          cat >> out/.config << 'EOF'
          CONFIG_KPROBES=y
          CONFIG_HAVE_KPROBES=y
          CONFIG_KPROBE_EVENTS=y
          CONFIG_KSU_MANUAL_HOOK=n
          CONFIG_KSU_KPROBE_HOOKS=y
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=n
          CONFIG_OVERLAY_FS=y
          EOF
          
          yes "" | make O=out olddefconfig
          yes "" | make O=out olddefconfig

      - name: Build Kernel
        run: |
          cd kernel
          export ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1
          export CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          export USE_CCACHE=1 CCACHE_DIR=$HOME/.ccache
          
          make -j$(nproc) O=out Image dtbs 2>&1 | tee build.log
          
          if [ ! -f "out/arch/arm64/boot/Image" ]; then
            echo "Build failed!"
            tail -100 build.log
            exit 1
          fi

      - name: Package AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3
          cd AnyKernel3
          cp ../kernel/out/arch/arm64/boot/Image .
          mkdir -p dtb && find ../kernel/out/arch/arm64/boot/dts/ -name "*.dtb" -exec cp {} dtb/ \; 2>/dev/null || true
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/DEVICE_NAME=.*/DEVICE_NAME="fogos"/' anykernel.sh
          zip -r9 "../fogos-RKSU-SUSFS-$(date +%Y%m%d).zip" * -x .git README.md .gitignore

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fogos-kernel-rksu-susfs
          path: fogos-RKSU-SUSFS-*.zip
          retention-days: 30
