name: Build Kernel fogos RKSU+SUSFS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            bc bison build-essential flex libssl-dev \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            ccache python3 zip unzip git wget curl patchutils

      - name: Setup Clang
        run: |
          git clone --depth=1 --branch lineage-20.0 \
            https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b \
            $HOME/clang
          echo "$HOME/clang/bin" >> $GITHUB_PATH

      - name: Clone kernel source
        run: |
          git clone --depth=1 --branch sixteen \
            https://github.com/Motorola-SM6375-Devs/android_kernel_motorola_sm6375 kernel
          cd kernel && echo "Kernel: $(git rev-parse --short HEAD)"

      - name: Fix sx937x driver bug
        run: |
          cd kernel
          if [ -f "drivers/misc/sx937x/sx937x_sar.c" ]; then
            if ! grep -q "^#include <linux/i2c.h>" drivers/misc/sx937x/sx937x_sar.c; then
              sed -i '1i #include <linux/i2c.h>' drivers/misc/sx937x/sx937x_sar.c
              echo "Fixed sx937x i2c.h include"
            fi
          fi

      - name: Integrate RKSU (rsuntk/KernelSU) with kprobe mode
        run: |
          cd kernel
          # Gunakan RKSU dari rsuntk (yang sudah Anda pakai di AyakaUI)
          # Gunakan kprobe mode (bukan manual hooks)
          curl -LSs "https://raw.githubusercontent.com/rsuntk/KernelSU/main/kernel/setup.sh" | bash -s main
          echo "RKSU integrated with kprobe mode"

      - name: Apply SUSFS patch from JackA1ltman
        run: |
          cd kernel
          # Download patch SUSFS yang sudah terbukti bekerja untuk kernel 5.4
          curl -LSs "https://raw.githubusercontent.com/JackA1ltman/NonGKI_Kernel_Build_2nd/mainline/Patches/Patch/susfs_patch_to_5.4.patch" > susfs.patch
          
          # Apply patch
          patch -p1 < susfs.patch || {
            echo "Patch failed, trying alternative method..."
            # Fallback: download dan apply secara manual
            git clone --depth=1 --branch kernel-5.4 https://gitlab.com/simonpunk/susfs4ksu.git susfs_temp
            patch -p1 < susfs_temp/kernel_patches/50_add_susfs_in_kernel-5.4.patch || true
            rm -rf susfs_temp
          }
          rm -f susfs.patch
          echo "SUSFS patch applied"

      - name: Configure kernel with kprobe + SUSFS
        run: |
          cd kernel
          export ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1
          export CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          mkdir -p out
          
          # Load defconfig
          make O=out ARCH=arm64 vendor/holi-qgki_defconfig
          scripts/kconfig/merge_config.sh -O out arch/arm64/configs/vendor/ext_config/moto-holi-fogos.config
          
          # Enable kprobe mode (BUKAN manual hooks) + SUSFS
          cat >> out/.config << 'EOF'
          CONFIG_KSU=y
          CONFIG_KPROBES=y
          CONFIG_HAVE_KPROBES=y
          CONFIG_KPROBE_EVENTS=y
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=n
          CONFIG_OVERLAY_FS=y
          EOF
          
          # Finalize config
          yes "" | make O=out ARCH=arm64 olddefconfig
          echo "Config finalized"

      - name: Build kernel
        run: |
          cd kernel
          export ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1
          export CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          export USE_CCACHE=1 CCACHE_DIR=$HOME/.ccache
          
          make -j$(nproc) O=out ARCH=arm64 Image.gz dtbs 2>&1 | tee build.log
          
          if [ ! -f "out/arch/arm64/boot/Image.gz" ]; then
            echo "Build failed!"
            tail -100 build.log
            exit 1
          fi
          echo "Build successful!"

      - name: Package with AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3
          cd AnyKernel3
          cp ../kernel/out/arch/arm64/boot/Image.gz .
          mkdir -p dtb
          find ../kernel/out/arch/arm64/boot/dts/ -name "*.dtb" -exec cp {} dtb/ \; 2>/dev/null || true
          
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/DEVICE_NAME=.*/DEVICE_NAME="fogos"/' anykernel.sh
          sed -i 's/KERNEL_NAME=.*/KERNEL_NAME="AyakaUI-RKSU-SUSFS"/' anykernel.sh
          
          ZIP_NAME="fogos-RKSU-SUSFS-$(date +%Y%m%d-%H%M).zip"
          zip -r9 "../$ZIP_NAME" * -x .git README.md .gitignore
          cd ..
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fogos-kernel-rksu-susfs
          path: ${{ env.ZIP_NAME }}
          retention-days: 30
