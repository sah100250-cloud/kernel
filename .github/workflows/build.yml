name: Build Kernel fogos KSU-Next+SUSFS

on:
  workflow_dispatch:

env:
  DEVICE: fogos
  KERNEL_REPO: https://github.com/Motorola-SM6375-Devs/android_kernel_motorola_sm6375
  KERNEL_BRANCH: sixteen

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            bc bison build-essential flex libssl-dev \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            ccache python3 zip unzip git wget curl patchutils

      - name: Setup Clang
        run: |
          git clone --depth=1 --branch lineage-20.0 \
            https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b \
            $HOME/clang
          echo "$HOME/clang/bin" >> $GITHUB_PATH
          clang --version

      - name: Clone kernel
        run: |
          git clone --depth=1 --branch ${{ env.KERNEL_BRANCH }} \
            ${{ env.KERNEL_REPO }} kernel
          cd kernel
          echo "Kernel: $(git rev-parse --short HEAD)"
          echo "Kernel base: $(cat Makefile | grep -E '^VERSION|^PATCHLEVEL|^SUBLEVEL' | head -3)"

      - name: Integrate KernelSU-Next (KPROBE mode - NO manual hooks)
        run: |
          cd kernel
          
          # Clone dari branch MAIN (resmi, stabil)
          git clone --depth=1 --branch main \
            https://github.com/rifsxd/KernelSU-Next KernelSU-Next
          
          # Manual integration (tanpa setup.sh)
          ln -sf $(pwd)/KernelSU-Next/kernel drivers/kernelsu
          
          # Inject ke Makefile kernel
          if ! grep -q "drivers/kernelsu" Makefile; then
            sed -i '/^drivers-$(CONFIG_MODULES)/i drivers-y += drivers/kernelsu/' Makefile
            echo "✅ Added drivers/kernelsu to Makefile"
          fi
          
          # Inject ke Kconfig drivers
          if ! grep -q "kernelsu/Kconfig" drivers/Kconfig; then
            sed -i '/^endmenu$/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
            echo "✅ Added kernelsu Kconfig"
          fi
          
          # Verifikasi
          ls -la KernelSU-Next/
          ls -la drivers/kernelsu

      - name: Apply SUSFS kernel patches (filtered, skip KSU original files)
        run: |
          cd kernel
          
          # Clone SUSFS
          git clone --depth=1 --branch kernel-5.4 \
            https://gitlab.com/simonpunk/susfs4ksu.git susfs_temp
          
          # Filter patch: BUANG semua patch untuk KSU original files
          # (karena KSU-Next tidak punya file-file ini)
          filterdiff -x 'kernel/allowlist.c' \
                     -x 'kernel/apk_sign.c' \
                     -x 'kernel/apk_sign.h' \
                     -x 'kernel/core_hook.c' \
                     -x 'kernel/kernel_compat.c' \
                     -x 'kernel/kernel_compat.h' \
                     -x 'kernel/ksu.c' \
                     -x 'kernel/ksud.c' \
                     -x 'kernel/ksud.h' \
                     -x 'kernel/manager.h' \
                     -x 'kernel/selinux/rules.c' \
                     -x 'kernel/selinux/selinux.c' \
                     -x 'kernel/selinux/selinux.h' \
                     -x 'kernel/sucompat.c' \
                     -x 'kernel/throne_tracker.c' \
                     -x 'kernel/throne_tracker.h' \
                     susfs_temp/kernel_patches/50_add_susfs_in_kernel-5.4.patch \
                     > susfs_kernel_only.patch
          
          echo "=== Patch size after filter ==="
          wc -l susfs_kernel_only.patch
          
          # Apply patch ke kernel core (fs/, include/, kernel/)
          patch -p1 --no-backup-if-mismatch < susfs_kernel_only.patch 2>&1 || {
            echo "⚠️ Some patches failed, that's OK - manual fix akan handle"
          }
          
          # MANUAL FIX 1: INODE_STATE_SUS_KSTAT
          if ! grep -rq "INODE_STATE_SUS_KSTAT" include/linux/; then
            echo "🔧 Manual fix: INODE_STATE_SUS_KSTAT"
            cat >> include/linux/fs.h << 'EOF'
          
          /* SUSFS manual fix for KernelSU-Next */
          #ifndef INODE_STATE_SUS_KSTAT
          #define INODE_STATE_SUS_KSTAT (1 << 15)
          #endif
          EOF
          fi
          
          # MANUAL FIX 2: MNT_SUSFS (mount flags)
          if ! grep -q "MNT_SUSFS" include/linux/mount.h; then
            echo "🔧 Manual fix: MNT_SUSFS"
            cat >> include/linux/mount.h << 'EOF'
          
          /* SUSFS mount flag */
          #ifndef MNT_SUSFS
          #define MNT_SUSFS 0x10000000
          #endif
          EOF
          fi
          
          # MANUAL FIX 3: PROC_PID_FD_SUSFS (untuk task_mmu.c)
          if ! grep -rq "PROC_PID_FD_SUSFS" fs/proc/ include/linux/; then
            echo "🔧 Manual fix: PROC_PID_FD_SUSFS placeholder"
            # Skip if not needed
          fi
          
          # Cleanup
          rm -rf susfs_temp susfs_kernel_only.patch
          echo "✅ SUSFS kernel patches applied"

      - name: Configure kernel (AFTER KSU integrated)
        run: |
          cd kernel
          export ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1
          export CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          mkdir -p out
          
          # 1. Load defconfig device
          make O=out ARCH=arm64 vendor/holi-qgki_defconfig
          scripts/kconfig/merge_config.sh -O out arch/arm64/configs/vendor/ext_config/moto-holi-fogos.config
          
          # 2. Tambahkan KSU + SUSFS config (KPROBE mode - OTOMATIS, tanpa manual hook!)
          cat >> out/.config << 'EOF'
          # KernelSU-Next dengan KPROBE mode
          CONFIG_KSU=y
          CONFIG_KSU_KPROBE_HOOKS=y
          CONFIG_KPROBES=y
          CONFIG_KPROBE_EVENTS=y
          CONFIG_HAVE_KPROBES=y
          CONFIG_KPROBE_EVENTS_ON_INSTANCE=y
          
          # SUSFS configuration
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=n
          
          # OverlayFS (butuh untuk SUSFS module)
          CONFIG_OVERLAY_FS=y
          EOF
          
          # 3. Finalize config 2x (pastikan semua ter-resolve)
          make O=out ARCH=arm64 olddefconfig
          make O=out ARCH=arm64 olddefconfig
          
          # 4. Verifikasi
          echo "=== Verifikasi config ==="
          grep -E "CONFIG_KSU=|CONFIG_KPROBES=|CONFIG_KSU_SUSFS=" out/.config

      - name: Build kernel
        run: |
          cd kernel
          export ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1
          export CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          export USE_CCACHE=1 CCACHE_DIR=$HOME/.ccache
          
          make -j$(nproc) O=out Image dtbs 2>&1 | tee build.log
          
          echo "=== Build output ==="
          ls -la out/arch/arm64/boot/ || true
          
          if [ ! -f "out/arch/arm64/boot/Image" ]; then
            echo "❌ Build failed!"
            echo "=== Last 150 lines ==="
            tail -150 build.log
            exit 1
          fi
          
          echo "✅ Build SUCCESS!"

      - name: Package AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3
          cd AnyKernel3
          cp ../kernel/out/arch/arm64/boot/Image .
          mkdir -p dtb
          find ../kernel/out/arch/arm64/boot/dts/ -name "*.dtb" -exec cp {} dtb/ \; 2>/dev/null || true
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/DEVICE_NAME=.*/DEVICE_NAME="fogos"/' anykernel.sh
          sed -i 's/KERNEL_NAME=.*/KERNEL_NAME="AyakaUI-fogos-KSUNext-SUSFS"/' anykernel.sh
          ZIP="fogos-KSUNext-SUSFS-$(date +%Y%m%d-%H%M).zip"
          zip -r9 "../$ZIP" * -x .git README.md .gitignore
          cd ..
          echo "ZIP_NAME=$ZIP" >> $GITHUB_ENV

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: fogos-kernel-ksunext-susfs
          path: |
            ${{ env.ZIP_NAME }}
            kernel/out/arch/arm64/boot/Image
          retention-days: 30
